<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="simon.css">
</head>
<body>
    <br><br>
    <h1>Simon Says Games</h1>
    <br><br>

    <h3>Press any key to start the game :</h3>

    <div class="btn-container">
        <div class="line-one">        
            <div class="btn btn-red" id="btn-red" type="button"></div>
            <div class="btn btn-yellow" id="btn-yellow" type="button"></div>
        </div>
        <div class="line-two">
            <div class="btn btn-green" id="btn-green" type="button"></div>
            <div class="btn btn-purple" id="btn-purple" type="button"></div>
        </div>
    </div>

    <script src="simon.js"></script>
</body>
</html>
